<h1>Terminal</h1>

<pre id="output"></pre>

<!--Info DevTools-->
<h1>Info sui DevTools</h1>
<p>Faculty Editor DevTools v3</p>
<p>Codice Build KA93KEVN0UB8S</p>

<script>
    function commit() {
        const message = prompt("Inserisci messagio di commit:");
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let hash = "";
        for (let i = 0; i < 40; i++) {
            hash += chars.charAt(Math.floor(Math.random() * chars.length));
        } 
        prompt(`Creato commit con messaggio: "${message}"\nHash: vedi il precompilato (Utilizza l'hash per ripristinare i dati; e non puoi più rivederlo, annotalo!)`, hash);
    }

    function push() {
        const repo = prompt("Inserisci repository: (Ad esempio: per gli URL https://github.com/username/repo.git, oppure, se si tratta di un repository Git locale, repository_name.)");
        alert(`Fatto push su ${repo}`);
    }

    function restore() {
        const hash = prompt("Inserisci l'hash del commit da ripristinare:");
        alert(`Il repository è stato ripristinato al commit con hash ${hash}`);
}

    function cfg() {
    const name = prompt("Inserisci il tuo nome:");
    const email = prompt("Inserisci la tua email:");
    const reponame = prompt("Inserisci il nome del repository:");

    if (reponame.includes("http://") || reponame.includes("https://")) {
        try {
            const domain = new URL(reponame).hostname.split('.')[0];
            alert(`400: Richiesta non valida. Il server ${domain} ha bloccato la richiesta. Si prega di utilizzare repository Git locali.`);
        } catch (e) {
            alert("URL non valido.");
        }
    } else {
        alert(`Git configurato con il nome: ${name} e indirizzo email: ${email}, repository: ${reponame}`);
        const bTag = document.querySelector("b");
        bTag.textContent = reponame;
    }
}

    function execCmd() {
    const input = document.getElementById("prompt-input");
    const output = document.getElementById("output");

    const cmd = input.value.trim();
    if (!cmd) return;

    const responses = {
        "ls": "FacultyEditorOpenedFiles",
        "pwd": "FacultyEditorExecutingPath",
        "git status": "On branch main\nnothing to commit, working tree clean",
        "help":"Available commands:\n- ls: List opened files\n- pwd: Show executing path\n- git status: Show git status\n- sudo apt install [package]: Package installation\n- sudo apt remove [package]: Package removal\n- sudo apt run [package]: Running a package"
    };

    let result = "Command not recognized";

    if (responses[cmd]) {
        result = responses[cmd];
    }
    else if (cmd.startsWith("sudo apt install ")) {
        const pkg = cmd.replace("sudo apt install ", "");
        result = `Installing ${pkg}... Done!`;
    }
    else if (cmd.startsWith("sudo apt remove ")) {
        const pkg = cmd.replace("sudo apt remove ", "");
        result = `Removing ${pkg}... Done!`;
    }
    else if (cmd.startsWith("sudo apt run ")) {
        const pkg = cmd.replace("sudo apt run ", "");
        result = `Running ${pkg}...`;
    }

    // output stile terminale
    output.textContent += `> ${cmd}\n${result}\n\n`;

    // scroll automatico
    output.scrollTop = output.scrollHeight;

    input.value = "";
}
</script>
