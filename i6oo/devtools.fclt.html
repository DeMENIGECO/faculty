<!-- Finto Git -->

<h1>Git</h1>

<p>Repository for commits and restore: <b>null</b> <button onclick="cfg()">Configure</button></p>
<p>
<button onclick="commit()">Commit</button>
<button onclick="push()">Push</button>
<button onclick="restore()">Restore</button>
</p>

<!-- Terminal Unix-style-->

<h1>Terminal</h1>
<textarea id="prompt-input" placeholder="Type a command"></textarea><button onclick="execCmd()">Execute</button>
<pre id="output"></pre>

<script>
    function commit() {
        const message = prompt("Enter commit message:");
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let hash = "";
        for (let i = 0; i < 40; i++) {
            hash += chars.charAt(Math.floor(Math.random() * chars.length));
        } 
        prompt(`Committed with message: "${message}"\nHash: view precompiled (Use hash to restore, and you can't see the hash anymore, write it down!)`, hash);
    }

    function push() {
        const repo = prompt("Enter repository: (e.g.s: for urls https://github.com/username/repo.git, or if a git local repo, repository_name.)");
        alert(`Pushed to ${repo}`);
    }

    function restore() {
        const hash = prompt("Enter commit hash to restore:");
        alert(`Restored to commit ${hash}`);
}

    function cfg() {
    const name = prompt("Enter your name:");
    const email = prompt("Enter your email:");
    const reponame = prompt("Enter repository name:");

    if (reponame.includes("http://") || reponame.includes("https://")) {
        try {
            const domain = new URL(reponame).hostname.split('.')[0];
            alert(`400: Bad Request. The server ${domain} has blocked the request. Please use local git repositories.`);
        } catch (e) {
            alert("Invalid URL");
        }
    } else {
        alert(`Git configured with name: ${name} and email: ${email}, repository: ${reponame}`);
        const bTag = document.querySelector("b");
        bTag.textContent = reponame;
    }
}

    function execCmd() {
    const input = document.getElementById("prompt-input");
    const output = document.getElementById("output");

    const cmd = input.value.trim();
    if (!cmd) return;

    const responses = {
        "ls": "FacultyEditorOpenedFiles",
        "pwd": "FacultyEditorExecutingPath",
        "git status": "On branch main\nnothing to commit, working tree clean",
        "help":"Available commands:\n- ls: List opened files\n- pwd: Show executing path\n- git status: Show git status\n- sudo apt install [package]: Package installation\n- sudo apt remove [package]: Package removal\n- sudo apt run [package]: Running a package"
    };

    let result = "Command not recognized";

    if (responses[cmd]) {
        result = responses[cmd];
    }
    else if (cmd.startsWith("sudo apt install ")) {
        const pkg = cmd.replace("sudo apt install ", "");
        result = `Installing ${pkg}... Done!`;
    }
    else if (cmd.startsWith("sudo apt remove ")) {
        const pkg = cmd.replace("sudo apt remove ", "");
        result = `Removing ${pkg}... Done!`;
    }
    else if (cmd.startsWith("sudo apt run ")) {
        const pkg = cmd.replace("sudo apt run ", "");
        result = `Running ${pkg}...`;
    }

    // output stile terminale
    output.textContent += `> ${cmd}\n${result}\n\n`;

    // scroll automatico
    output.scrollTop = output.scrollHeight;

    input.value = "";
}
</script>
